<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | test-yan-4 - Enterprise AI Strategy Consulting</title>
    <meta name="description" content="Learn about test-yan-4, the enterprise AI strategy consultancy helping CTOs and Chief AI Officers drive real P&L impact through structured roadmaps.">
    
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,600;1,100;1,200&display=swap');

        :root {
            --color-primary: #DA2128;
            --color-primary-dark: #B91C22;
            --color-background: #FAFAFA;
            --color-surface: #FFFFFF;
            --color-text: #111111;
            --color-text-muted: #666666;
            --color-border: #EEEEEE;
            --color-accent: #FFFFFF;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --section-padding: 120px;
            --container-width: 1100px;
            --radius-lg: 32px;
            --radius-md: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        section {
            padding: var(--section-padding) 0;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--color-border);
            height: 80px;
            display: flex;
            align-items: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--color-text);
            font-weight: 400;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--color-primary);
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 200;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        h1 { font-size: 4rem; margin-bottom: 2rem; }
        h2 { font-size: 3rem; margin-bottom: 1.5rem; }
        h3 { font-size: 1.5rem; font-weight: 400; margin-bottom: 1rem; }

        em {
            font-weight: 100;
            font-style: italic;
        }

        .text-muted {
            color: var(--color-text-muted);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-align: center;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-accent);
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding-top: 160px;
            padding-bottom: 80px;
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 700px;
            margin: 0 auto 2rem;
            font-weight: 300;
        }

        /* Content Sections */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }

        .card {
            background: var(--color-surface);
            padding: 48px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
        }

        .value-prop {
            margin-bottom: 80px;
        }

        .value-prop h3 {
            color: var(--color-primary);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        /* Pillars Section */
        .pillars {
            background-color: var(--color-surface);
        }

        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-top: 60px;
        }

        .pillar-item {
            padding: 32px;
            border-left: 1px solid var(--color-border);
        }

        /* Footer */
        footer {
            padding: 80px 0;
            border-top: 1px solid var(--color-border);
            background: var(--color-surface);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 40px;
        }

        .footer-logo { margin-bottom: 24px; }

        .footer-links h4 {
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .footer-links ul {
            list-style: none;
        }

        .footer-links ul li {
            margin-bottom: 12px;
        }

        .footer-links ul li a {
            text-decoration: none;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }

        .footer-links ul li a:hover {
            color: var(--color-primary);
        }

        .social-icons {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }

        .social-icon {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
        }

        .copyright {
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            h2 { font-size: 2rem; }
            .grid, .pillar-grid, .footer-grid {
                grid-template-columns: 1fr;
            }
            .hero { padding-top: 80px; }
            .nav-links { display: none; }
            section { padding: 80px 0; }
        }
    </style>
