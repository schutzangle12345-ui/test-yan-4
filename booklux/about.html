<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | BookLux — The AI Luxury Concierge</title>
    <meta name="description" content="Learn about BookLux, the AI-powered concierge redefining luxury travel. We streamline private jets, yacht charters, and villa rentals for the modern traveler.">
    
    <!-- Google Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500&display=swap');

        :root {
            --color-primary: #DA2128;
            --color-primary-dark: #B91C22;
            --color-background: #FDFDFD;
            --color-surface: #FFFFFF;
            --color-text: #1A1A1A;
            --color-text-muted: #666666;
            --color-border: #EEEEEE;
            --color-accent: #FFFFFF;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            --section-padding: 120px 20px;
            --container-width: 1100px;
            --border-radius-lg: 32px;
            --border-radius-sm: 8px;
            --header-height: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: opacity 0.2s ease;
        }

        ul {
            list-style: none;
        }

        /* Layout */
        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            width: 100%;
        }

        /* Header */
        header {
            height: var(--header-height);
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid var(--color-border);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            width: 100%;
            max-width: var(--container-width);
            margin: 0 auto;
        }

        .logo-link {
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 400;
            color: var(--color-text);
            letter-spacing: 0.5px;
        }

        .nav-cta {
            background-color: var(--color-primary);
            color: var(--color-accent);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .nav-cta:hover {
            background-color: var(--color-primary-dark);
        }

        /* Hero Section */
        .hero {
            padding: 180px 20px 100px;
            text-align: center;
        }

        h1 {
            font-weight: 100;
            font-size: clamp(40px, 8vw, 72px);
            line-height: 1.1;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        h1 em {
            font-style: italic;
            font-weight: 200;
        }

        .hero p {
            font-size: 20px;
            color: var(--color-text-muted);
            max-width: 700px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* About Sections */
        .section {
            padding: var(--section-padding);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .content-block h2 {
            font-weight: 200;
            font-size: 36px;
            margin-bottom: 24px;
        }

        .content-block p {
            margin-bottom: 20px;
            color: var(--color-text-muted);
            font-size: 17px;
        }

        /* Cards Style */
        .values-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 60px;
        }

        .value-card {
            background: var(--color-surface);
            padding: 50px 40px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--color-border);
            text-align: left;
        }

        .value-card h3 {
            font-weight: 400;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .value-card p {
            font-size: 15px;
            color: var(--color-text-muted);
            line-height: 1.7;
        }

        /* Dark Section for Contrast */
        .dark-section {
            background-color: var(--color-text);
            color: var(--color-accent);
            text-align: center;
            border-radius: var(--border-radius-lg);
            margin: 0 20px;
            padding: 100px 40px;
        }

        .dark-section h2 {
            font-weight: 100;
            font-size: 48px;
            margin-bottom: 30px;
        }

        .dark-section p {
            max-width: 600px;
            margin: 0 auto 40px;
            opacity: 0.8;
            font-weight: 300;
            font-size: 18px;
        }

        /* Footer */
        footer {
            padding: 100px 20px 60px;
            border-top: 1px solid var(--color-border);
            margin-top: 60px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 60px;
            margin-bottom: 60px;
        }

        .footer-brand p {
            margin-top: 20px;
            color: var(--color-text-muted);
            max-width: 300px;
            font-size: 14px;
        }

        .footer-links h4 {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-links ul li {
            margin-bottom: 12px;
        }

        .footer-links ul li a {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .footer-bottom {
            padding-top: 40px;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--color-text-muted);
        }

        .social-icons {
            display: flex;
            gap: 20px;
        }

        .social-icons svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-muted);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid, .values-grid {
                grid-template-columns: 1fr;
            }
            .nav-links {
                display: none;
            }
            .section {
                padding: 80px 20px;
            }
            .footer-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>
